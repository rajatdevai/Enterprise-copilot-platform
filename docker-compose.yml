services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-service
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  gateway-service:
    build: ./gateway-service
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - ORCHESTRATOR_URL=http://ai-orchestrator:8001
      - REDIS_HOST=redis
    depends_on:
      - redis
      - auth-service

  auth-service:
    build: ./auth-service
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://user:password@postgres:5432/copilot
      - JWT_SECRET=${JWT_SECRET:-supersecret}
    depends_on:
      - postgres

  ai-orchestrator:
    build: ./ai-orchestrator
    environment:
      - PORT=8001
      - AGENT_SERVICE_URL=http://agent-service:8002
      - RETRIEVAL_SERVICE_URL=http://retrieval-service:8003
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
      - redis

  embedding-service:
    build: ./embedding-service
    environment:
      - PORT=8004
    volumes:
      - ./embedding-service/models:/app/models

  retrieval-service:
    build: ./retrieval-service
    environment:
      - PORT=8003
      - EMBEDDING_SERVICE_URL=http://embedding-service:8004
    volumes:
      - ./retrieval-service/indexes:/app/indexes

  document-service:
    build: ./document-service
    environment:
      - PORT=8005
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./document-service/uploads:/app/uploads

  agent-service:
    build: ./agent-service
    environment:
      - PORT=8002
    depends_on:
      - redis

  worker-service:
    build: ./worker-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://user:password@postgres:5432/copilot

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
